<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot password — Smart Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="brand">
        <h1>Smart Auth</h1>
        <p>Reset your password</p>
      </div>
      <div class="card">
        <h2>Forgot password</h2>
        <div id="form-alert" class="alert" role="alert"></div>
        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com" />
          </div>
          <button type="submit" class="btn">Send reset link</button>
        </form>
        <div id="resultBox" class="result-box" aria-live="polite"></div>
        <div class="footer-links">
          <a href="index.html">Back to sign in</a>
        </div>
      </div>
    </div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
