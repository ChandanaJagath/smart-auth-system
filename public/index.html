<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Smart Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="brand">
        <h1>Smart Auth</h1>
        <p>Secure session-based authentication</p>
      </div>
      <div class="card">
        <h2>Sign in</h2>
        <div id="form-alert" class="alert" role="alert"></div>
        <form id="login-form" novalidate autocomplete="off">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="auth_email_field"
              autocomplete="off"
              required
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input
                type="password"
                id="password"
                name="auth_pass_field"
                autocomplete="new-password"
                required
                placeholder="••••••••"
              />
              <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" title="Show password">
                <span class="toggle-password__icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="remember" name="auth_remember" autocomplete="off" />
            <label for="remember">Remember me for 30 days</label>
          </div>
          <button type="submit" class="btn">Sign in</button>
        </form>
        <div class="footer-links">
          <a href="forgot.html">Forgot password?</a>
        </div>
        <div class="footer-links" style="margin-top: 0.5rem">
          No account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
